packages:
  - packages/*
  - templates/*
  - nextjs
  - examples
  - guide
  - website
  - site

allowBuilds:
  "@clerk/shared": false
  core-js: false
  esbuild: true
  msw: false
  sharp: true
  workerd: true

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - clava

overrides:
  "@wordpress/components>@ariakit/react": "workspace:*"

patchedDependencies:
  "@changesets/apply-release-plan@7.1.1": "patches/@changesets__apply-release-plan@7.1.1.patch"

publicHoistPattern:
  - "*react*"
  - "*testing-library*"

saveExact: true
