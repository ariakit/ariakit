name: issue-fixed

on:
  pull_request_target:
    types: [closed]

jobs:
  comment:
    name: Comment on fixed issues
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Get linked issues
        id: issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          issue_numbers=$(gh api graphql -f query="
            query {
              repository(owner: \"$REPO_OWNER\", name: \"$REPO_NAME\") {
                pullRequest(number: $PR_NUMBER) {
                  closingIssuesReferences(first: 50) {
                    nodes {
                      number
                      repository {
                        owner { login }
                        name
                      }
                    }
                  }
                }
              }
            }
          " --jq ".data.repository.pullRequest.closingIssuesReferences.nodes[] | select(.repository.owner.login == \"$REPO_OWNER\" and .repository.name == \"$REPO_NAME\") | .number")

          if [ -z "$issue_numbers" ]; then
            echo "No linked issues found"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "numbers<<EOF" >> "$GITHUB_OUTPUT"
          echo "$issue_numbers" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Get pkg-pr-new comment
        if: steps.issues.outputs.found == 'true'
        id: packages
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          fetch_comment() {
            gh api --paginate --slurp "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
              | jq -r '[.[][] | select(.user.login == "pkg-pr-new[bot]")] | last | .body // empty'
          }

          comment_body=$(fetch_comment)

          if [ -z "$comment_body" ]; then
            echo "Waiting for pkg-pr-new comment..."
            for i in {1..10}; do
              sleep 30
              comment_body=$(fetch_comment)
              if [ -n "$comment_body" ]; then
                break
              fi
              echo "Attempt $i: not found yet"
            done
          fi

          if [ -z "$comment_body" ]; then
            echo "No pkg-pr-new comment found after waiting"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm_commands=$(echo "$comment_body" | grep -oE 'npm i https://pkg\.pr\.new/[^ ]+' || true)

          if [ -z "$npm_commands" ]; then
            echo "No npm commands found in pkg-pr-new comment"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "commands<<EOF" >> "$GITHUB_OUTPUT"
          echo "$npm_commands" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment on issues
        if: steps.packages.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.ARIAKIT_BOT_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBERS: ${{ steps.issues.outputs.numbers }}
          NPM_COMMANDS: ${{ steps.packages.outputs.commands }}
        run: |
          set -euo pipefail

          marker="<!-- issue-fixed-pr-$PR_NUMBER -->"

          {
            echo "$marker"
            echo "This issue has been fixed and will be included in the next release."
            echo ""
            echo "If you'd like to try it now, you can install the canary version:"
            echo ""
            while IFS= read -r cmd; do
              echo '```'
              echo "$cmd"
              echo '```'
              echo ""
            done <<< "$NPM_COMMANDS"
          } > body.md

          while IFS= read -r issue_number; do
            existing=$(gh api --paginate --slurp "repos/$REPO/issues/$issue_number/comments?per_page=100" \
              | jq "[.[][] | select(.body | contains(\"$marker\"))] | length")
            if [ "$existing" -gt 0 ]; then
              echo "Skipping issue #$issue_number (already commented)"
              continue
            fi
            gh issue comment "$issue_number" \
              --repo "$REPO" \
              --body-file body.md
            echo "Commented on issue #$issue_number"
          done <<< "$ISSUE_NUMBERS"
