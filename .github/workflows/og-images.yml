name: og-images

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate OG images
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Install Playwright
        uses: ./.github/workflows/install-playwright
        with:
          engine: chromium

      - name: Run app dev server
        shell: bash
        run: |
          set -euo pipefail
          pnpm -F site run dev &
          echo "Waiting for dev server (http://localhost:4321)..."
          ready=0
          for i in {1..90}; do
            if curl -sSf http://localhost:4321/og-image/api > /dev/null; then
              echo "Dev server is up."
              ready=1
              break
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          if [ "$ready" != "1" ]; then
            echo "Dev server failed to start in time."
            exit 1
          fi

      - name: Generate OG images
        run: pnpm -F site run og-image-generate

      - name: Generate patch
        id: patch
        run: |
          git add -A
          if git diff --cached --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit or create PR
        if: steps.patch.outputs.has_changes == 'true'
        uses: ./.github/workflows/commit-or-pr
        with:
          event: ${{ github.event_name }}
          message: Update OG images
          head-branch: ${{ github.head_ref || github.ref_name }}
          new-branch: chore/update-og-images
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
