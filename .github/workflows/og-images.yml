name: og-images

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate OG images
    runs-on: macos-latest
    outputs:
      has_changes: ${{ steps.patch.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Install Playwright
        uses: ./.github/workflows/install-playwright
        with:
          engine: chromium

      - name: Run app dev server
        shell: bash
        run: |
          set -euo pipefail
          pnpm -F site run dev &
          echo "Waiting for dev server (http://localhost:4321)..."
          ready=0
          for i in {1..90}; do
            if curl -sSf http://localhost:4321/og-image/api > /dev/null; then
              echo "Dev server is up."
              ready=1
              break
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          if [ "$ready" != "1" ]; then
            echo "Dev server failed to start in time."
            exit 1
          fi

      - name: Generate OG images
        run: pnpm -F site run og-image-generate

      - name: Generate patch
        id: patch
        run: |
          git add -A
          if git diff --cached --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --cached --binary > og-images.patch
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload patch artifact
        if: steps.patch.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: og-images-diff
          path: og-images.patch

  update:
    name: Update OG images
    needs: generate
    if: needs.generate.outputs.has_changes == 'true'
    permissions:
      actions: read
      contents: write
      pull-requests: write
    uses: ./.github/workflows/apply-generated-patch.yml
    with:
      artifact-name: og-images-diff
      patch-file: og-images.patch
      message: Update OG images
      event: ${{ github.event_name }}
      head-branch: ${{ github.head_ref || github.ref_name }}
      new-branch: chore/update-og-images
    secrets: inherit
