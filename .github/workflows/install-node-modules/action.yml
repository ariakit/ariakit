name: install-node-modules
description: Install node modules

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v5
      with:
        cache: true

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: Install dependencies
      shell: bash
      run: pnpm install
