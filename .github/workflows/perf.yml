name: perf

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Build app
        env:
          CLOUDFLARE_ENV: preview
          PERF_SOURCE_MAP: true
        run: pnpm -F app run build

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-build
          path: |
            app/dist
            app/.wrangler/deploy/config.json
          retention-days: 7
          include-hidden-files: true

  build-nextjs:
    name: Build Next.js app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Build Next.js app
        run: pnpm -F nextjs run build-worker

      - name: Upload Next.js artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-dist
          path: nextjs/.open-next
          retention-days: 7
          include-hidden-files: true

  chrome-baseline:
    name: Prepare Chrome baseline
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout baseline repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Find base app artifact
        id: find-base-artifact
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          BRANCH_REF: ${{ github.event.pull_request.base.ref }}
        with:
          script: |
            const baseSha = '${{ github.event.pull_request.base.sha }}';
            const branchRef = process.env.BRANCH_REF;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'app.yml',
              branch: branchRef,
              head_sha: baseSha,
              // Only push runs build exactly at head_sha. Pull request runs
              // check out the merge ref, so their artifacts are not a build
              // of base.sha and would corrupt stacked PR baselines.
              event: 'push',
              status: 'success',
              per_page: 1,
            });
            const run = runs.data.workflow_runs[0];
            if (!run) {
              core.notice(
                `No successful push app.yml run found for base SHA ${baseSha}. ` +
                  'Building base artifacts in this job.',
              );
              return;
            }
            core.setOutput('run-id', String(run.id));

      - name: Download base app artifact
        id: base-artifact
        if: steps.find-base-artifact.outputs.run-id != ''
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: app-build
          path: app
          github-token: ${{ github.token }}
          run-id: ${{ steps.find-base-artifact.outputs.run-id }}

      - name: Download base Next.js artifact
        id: base-nextjs-artifact
        if: steps.find-base-artifact.outputs.run-id != ''
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: nextjs-dist
          path: nextjs/.open-next
          github-token: ${{ github.token }}
          run-id: ${{ steps.find-base-artifact.outputs.run-id }}

      - name: Check base app source maps
        id: base-source-maps
        if: steps.base-artifact.outcome == 'success'
        run: |
          shopt -s nullglob
          maps=(app/dist/client/_astro/*.js.map)
          if [ ${#maps[@]} -gt 0 ]; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
          elif grep -q "PERF_SOURCE_MAP" app/astro.config.ts; then
            # app.yml artifacts intentionally omit source maps so ordinary app
            # artifacts stay smaller. Perf rebuilds only the base app artifact
            # when source maps are needed for readable script profiles.
            echo "::notice::Base app artifact has no client source maps. Building the base app artifact in this job."
            echo "missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Base app artifact has no client source maps, and this base commit cannot enable them yet."
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set baseline rebuild flags
        id: baseline-rebuild
        run: |
          rebuild_app=false
          rebuild_nextjs=false
          if [ "${{ steps.base-artifact.outcome }}" != "success" ] || [ "${{ steps.base-source-maps.outputs.missing }}" = "true" ]; then
            rebuild_app=true
          fi
          if [ "${{ steps.base-nextjs-artifact.outcome }}" != "success" ]; then
            rebuild_nextjs=true
          fi
          echo "app=$rebuild_app" >> "$GITHUB_OUTPUT"
          echo "nextjs=$rebuild_nextjs" >> "$GITHUB_OUTPUT"

      - name: Clean base app artifact
        if: steps.baseline-rebuild.outputs.app == 'true'
        run: |
          rm -rf \
            app/dist \
            app/.wrangler

      - name: Clean base Next.js artifact
        if: steps.baseline-rebuild.outputs.nextjs == 'true'
        run: rm -rf nextjs/.open-next

      - name: Install pnpm
        if: steps.baseline-rebuild.outputs.app == 'true' || steps.baseline-rebuild.outputs.nextjs == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          cache: true

      - name: Set up Node
        if: steps.baseline-rebuild.outputs.app == 'true' || steps.baseline-rebuild.outputs.nextjs == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        if: steps.baseline-rebuild.outputs.app == 'true' || steps.baseline-rebuild.outputs.nextjs == 'true'
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build base app
        if: steps.baseline-rebuild.outputs.app == 'true'
        env:
          CLOUDFLARE_ENV: preview
          PERF_SOURCE_MAP: true
        run: pnpm -F app run build

      - name: Build base Next.js app
        if: steps.baseline-rebuild.outputs.nextjs == 'true'
        run: pnpm -F nextjs run build-worker

      - name: Check baseline artifacts
        run: |
          for path in \
            app/dist \
            app/.wrangler/deploy/config.json \
            nextjs/.open-next
          do
            if [ ! -e "$path" ]; then
              echo "Missing baseline path: $path" >&2
              exit 1
            fi
          done

      - name: Pack baseline artifacts
        run: |
          tar -czf "$RUNNER_TEMP/perf-chrome-baseline-build.tar.gz" \
            -C . \
            app/dist \
            app/.wrangler/deploy/config.json \
            nextjs/.open-next

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v7
        with:
          name: perf-chrome-baseline-build
          path: ${{ runner.temp }}/perf-chrome-baseline-build.tar.gz
          retention-days: 7

  node-baseline:
    name: Prepare Node baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Set up baseline worktree
        run: |
          BASELINE_DIR="$RUNNER_TEMP/perf-node-baseline"
          echo "BASELINE_DIR=$BASELINE_DIR" >> "$GITHUB_ENV"
          git worktree add --detach "$BASELINE_DIR" \
            ${{ github.event.pull_request.base.sha }}

      - name: Install dependencies (baseline)
        working-directory: ${{ runner.temp }}/perf-node-baseline
        env:
          # The baseline worktree shares `.git/config` with the main checkout,
          # so husky's prepare step would otherwise rewrite `core.hooksPath`
          # to a relative path under a temporary worktree.
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Copy benchmark files to baseline
        run: |
          cp vitest.bench.config.ts "$BASELINE_DIR/vitest.bench.config.ts"
          shopt -s nullglob
          for file in packages/*/benchmark/*.bench.ts; do
            mkdir -p "$BASELINE_DIR/$(dirname "$file")"
            cp "$file" "$BASELINE_DIR/$file"
          done

      - name: Pack baseline artifacts
        run: |
          cd "$BASELINE_DIR"
          tar -czf "$RUNNER_TEMP/perf-node-baseline-build.tar.gz" \
            packages/*/package.json \
            vitest.bench.config.ts \
            packages/*/benchmark

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v7
        with:
          name: perf-node-baseline-build
          path: ${{ runner.temp }}/perf-node-baseline-build.tar.gz
          retention-days: 7

  chrome:
    name: Chrome (${{ matrix.shard }}/${{ strategy.job-total }})
    needs: [build, build-nextjs, chrome-baseline]
    runs-on: ubuntu-latest
    strategy:
      # Let all shards finish even if one fails, so each shard's logs and
      # uploaded rounds stay available for debugging. The post job marks
      # Chrome inconclusive when any shard fails.
      fail-fast: false
      matrix:
        # `shard` is the only matrix dimension, so the job count equals the
        # shard count; PERF_SHARD_TOTAL below derives from strategy.job-total.
        # Raise this list as the number of perf-chrome test files grows.
        shard: [1, 2, 3]
    permissions:
      actions: read
      contents: read
    env:
      # Clean runs stop after two paired rounds. Significant deltas get one
      # extra confirmation round before the PR comment is published.
      PERF_INITIAL_ROUNDS: 2
      PERF_CONFIRMATION_ROUNDS: 1
      # Keep per-round samples modest; paired rounds and confirmation preserve
      # enough signal for noisy results.
      PERF_ITERATIONS: 5
      PERF_WARMUP: 1
      # Script profiles are diagnostic and significantly slower. These values
      # are also passed through the legacy PERF_ITERATIONS/PERF_WARMUP names
      # for the baseline checkout, which may not support script-specific env
      # vars yet.
      PERF_SCRIPT_PROFILE_ITERATIONS: 3
      PERF_SCRIPT_PROFILE_WARMUP: 0
      PERF_SOURCE_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}
      # Each shard benchmarks a disjoint subset of the perf test files and runs
      # its own interleaved baseline-vs-current rounds on this one runner, so the
      # paired same-runner comparison is preserved. The post job runs
      # perf-compare once over every shard's raw round files.
      PERF_SHARD_INDEX: ${{ matrix.shard }}
      PERF_SHARD_TOTAL: ${{ strategy.job-total }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Install Playwright
        uses: ./.github/workflows/install-playwright
        with:
          engine: chromium

      - name: Set up baseline worktree
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          BASELINE_DIR="$RUNNER_TEMP/perf-baseline"
          echo "BASELINE_DIR=$BASELINE_DIR" >> "$GITHUB_ENV"
          git fetch --depth=1 origin "$BASE_SHA" || git fetch origin "$BASE_REF"
          git worktree add --detach "$BASELINE_DIR" "$BASE_SHA"

      - name: Install dependencies (baseline)
        working-directory: ${{ runner.temp }}/perf-baseline
        env:
          # The baseline worktree shares `.git/config` with the main checkout,
          # so husky's prepare step would otherwise rewrite `core.hooksPath`
          # to a relative path under a temporary worktree.
          HUSKY: 0
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Playwright (baseline)
        working-directory: ${{ runner.temp }}/perf-baseline
        run: pnpm exec playwright install --with-deps chromium

      - name: Download baseline artifacts
        uses: actions/download-artifact@v8
        with:
          name: perf-chrome-baseline-build
          path: ${{ runner.temp }}/perf-chrome-baseline-build

      - name: Extract baseline artifacts
        run: |
          tar -xzf \
            "${{ runner.temp }}/perf-chrome-baseline-build/perf-chrome-baseline-build.tar.gz" \
            -C "$BASELINE_DIR"

      - name: Clean current app artifacts
        run: rm -rf app/dist app/.wrangler nextjs/.open-next

      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: app-build
          path: app

      - name: Download Next.js artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-dist
          path: nextjs/.open-next

      - name: Run interleaved perf tests
        run: |
          rm -rf app/.perf-results "$BASELINE_DIR/app/.perf-results"
          mkdir -p app/.perf-results
          shopt -s nullglob
          SHARD_FILES=()
          ROUND_FILES=()
          manifest_status=failed
          manifest_message="Chrome shard exited before completing."

          write_chrome_manifest() {
            PERF_SHARD_STATUS="$manifest_status" \
            PERF_SHARD_MESSAGE="$manifest_message" \
            PERF_SHARD_FILES="$(printf '%s\n' "${SHARD_FILES[@]}")" \
            PERF_SHARD_ROUND_FILES="$(printf '%s\n' "${ROUND_FILES[@]}")" \
            node --input-type=module <<'NODE'
          import { writeFileSync } from "node:fs";

          const files = (process.env.PERF_SHARD_FILES ?? "")
            .split("\n")
            .filter(Boolean);
          const roundFiles = (process.env.PERF_SHARD_ROUND_FILES ?? "")
            .split("\n")
            .filter(Boolean);
          const manifest = {
            shard: Number(process.env.PERF_SHARD_INDEX),
            total: Number(process.env.PERF_SHARD_TOTAL),
            status: process.env.PERF_SHARD_STATUS,
            message: process.env.PERF_SHARD_MESSAGE,
            files,
            roundFiles,
          };
          writeFileSync(
            `app/.perf-results/shard-${process.env.PERF_SHARD_INDEX}-manifest.json`,
            `${JSON.stringify(manifest)}\n`,
          );
          NODE
          }

          add_round_file() {
            local file="$1"
            ROUND_FILES+=("$(basename "$file")")
          }

          has_matching_tests() {
            local workspace="$1"
            local grep_flag="$2"
            shift
            shift
            local output
            if ! output="$(
              cd "$workspace" || exit 1
              pnpm -F app run test-perf \
                --pass-with-no-tests \
                --list \
                "$grep_flag" "script profile" \
              "$@"
            )"; then
              printf '%s\n' "$output"
              manifest_status=failed
              manifest_message="Failed to list matching perf tests."
              exit 1
            fi
            if grep -Eq "Total: [1-9][0-9]* tests? in" <<< "$output"; then
              return 0
            fi
            return 1
          }

          trap write_chrome_manifest EXIT

          # Partition the perf test files across shards. The list is computed
          # from the current checkout and the SAME slice is passed to both the
          # baseline and current runs below, so every test's baseline and
          # current measurements stay on this one runner (paired comparison
          # preserved) no matter how the base and head test sets differ.
          # Keep this find pattern a superset of the perf `testMatch` in
          # app/playwright.config.ts; a file it misses would never be sharded.
          mapfile -t ALL_PERF_FILES < <(
            cd app && find src -type f \
              \( -path '*perf*-chrome.ts' -o -path '*perf*-chrome.tsx' \) \
              | sort
          )
          for idx in "${!ALL_PERF_FILES[@]}"; do
            if [ "$(( idx % PERF_SHARD_TOTAL ))" -eq "$(( PERF_SHARD_INDEX - 1 ))" ]; then
              SHARD_FILES+=("${ALL_PERF_FILES[$idx]}")
            fi
          done
          echo "Shard $PERF_SHARD_INDEX/$PERF_SHARD_TOTAL perf files: ${SHARD_FILES[*]:-<none>}"

          run_baseline_perf_round() {
            local i="$1"
            local group="$2"
            local iterations="$3"
            local warmup="$4"
            shift 4
            local perf_args=("$@")
            local result_prefix=baseline-"$i"-s"$PERF_SHARD_INDEX"-"$group"

            echo "::group::Round $i - baseline ($group)"
            if ! (
              cd "$BASELINE_DIR" || exit 1
              PERF_RESULTS_FILE="$result_prefix.json" \
              PERF_ITERATIONS="$iterations" \
              PERF_WARMUP="$warmup" \
              xvfb-run -a pnpm -F app run test-perf --pass-with-no-tests "${perf_args[@]}"
            ); then
              # The post job discards every shard's rounds when any shard
              # fails, so fail fast instead of benchmarking output that is
              # guaranteed to be thrown away.
              manifest_status=failed
              manifest_message="Baseline perf run failed for round $i."
              exit 1
            fi
            local baseline_files=("$BASELINE_DIR"/app/.perf-results/"$result_prefix"*.json)
            if [ ${#baseline_files[@]} -eq 0 ]; then
              # A clean run with no matching tests (new or renamed perf files
              # absent from the base worktree) stays comparable so
              # perf-compare can report them as new tests with no baseline.
              echo "::warning::No baseline perf results for round $i ($group); writing an empty baseline."
              local empty_baseline_file=app/.perf-results/"$result_prefix"-worker0.json
              printf '[]\n' > "$empty_baseline_file"
              add_round_file "$empty_baseline_file"
            else
              for file in "${baseline_files[@]}"; do
                cp "$file" app/.perf-results/
                add_round_file "$file"
              done
            fi
            echo "::endgroup::"
          }

          run_current_perf_round() {
            local i="$1"
            local group="$2"
            local iterations="$3"
            local warmup="$4"
            local allow_empty="$5"
            shift 5
            local perf_args=("$@")
            local result_prefix=current-"$i"-s"$PERF_SHARD_INDEX"-"$group"

            echo "::group::Round $i - current ($group)"
            if ! (
              PERF_RESULTS_FILE="$result_prefix.json" \
              PERF_ITERATIONS="$iterations" \
              PERF_WARMUP="$warmup" \
              xvfb-run -a pnpm -F app run test-perf --pass-with-no-tests "${perf_args[@]}"
            ); then
              manifest_status=failed
              manifest_message="Current perf run failed for round $i."
              exit 1
            fi
            local current_files=(app/.perf-results/"$result_prefix"*.json)
            if [ ${#current_files[@]} -eq 0 ]; then
              if [ "$allow_empty" -ne 1 ]; then
                echo "Missing current perf results for round $i ($group)" >&2
                manifest_status=failed
                manifest_message="No current perf results for round $i ($group)."
                exit 1
              fi
              echo "::warning::No current perf results for round $i ($group); writing an empty current result."
              local empty_current_file=app/.perf-results/"$result_prefix"-worker0.json
              printf '[]\n' > "$empty_current_file"
              add_round_file "$empty_current_file"
              echo "::endgroup::"
              return
            fi
            for file in "${current_files[@]}"; do
              add_round_file "$file"
            done
            echo "::endgroup::"
          }

          run_perf_round() {
            local i="$1"
            local group="$2"
            local iterations="$3"
            local warmup="$4"
            local allow_empty="$5"
            shift 5
            local perf_args=("$@")

            # Alternate sides first so same-runner drift cannot consistently
            # favor the baseline or current run across every paired round.
            if [ "$(( i % 2 ))" -eq 1 ]; then
              echo "Round $i ($group) order: baseline -> current"
              run_baseline_perf_round "$i" "$group" "$iterations" "$warmup" "${perf_args[@]}"
              run_current_perf_round "$i" "$group" "$iterations" "$warmup" "$allow_empty" "${perf_args[@]}"
            else
              echo "Round $i ($group) order: current -> baseline"
              run_current_perf_round "$i" "$group" "$iterations" "$warmup" "$allow_empty" "${perf_args[@]}"
              run_baseline_perf_round "$i" "$group" "$iterations" "$warmup" "${perf_args[@]}"
            fi
          }

          run_perf_rounds() {
            local i="$1"
            shift
            local perf_files=("$@")
            local current_has_timing=0
            local current_has_script_profile=0
            local baseline_has_script_profile=0
            if has_matching_tests "." --grep-invert "${perf_files[@]}"; then
              current_has_timing=1
            fi
            if has_matching_tests "." --grep "${perf_files[@]}"; then
              current_has_script_profile=1
            fi
            if has_matching_tests "$BASELINE_DIR" --grep "${perf_files[@]}"; then
              baseline_has_script_profile=1
            fi

            run_perf_round \
              "$i" \
              timing \
              "$PERF_ITERATIONS" \
              "$PERF_WARMUP" \
              "$(( 1 - current_has_timing ))" \
              --grep-invert "script profile" \
              "${perf_files[@]}"

            if [ "$current_has_script_profile" -eq 1 ] || [ "$baseline_has_script_profile" -eq 1 ]; then
              run_perf_round \
                "$i" \
                script-profile \
                "$PERF_SCRIPT_PROFILE_ITERATIONS" \
                "$PERF_SCRIPT_PROFILE_WARMUP" \
                "$(( 1 - current_has_script_profile ))" \
                --grep "script profile" \
                "${perf_files[@]}"
            fi
          }

          if [ ${#SHARD_FILES[@]} -eq 0 ]; then
            echo "No perf files assigned to this shard; nothing to benchmark."
            manifest_status=skipped
            manifest_message="No perf files assigned to this shard."
            exit 0
          fi

          for i in $(seq 1 "$PERF_INITIAL_ROUNDS"); do
            run_perf_rounds "$i" "${SHARD_FILES[@]}"
          done

          # This per-shard comparison only decides whether THIS shard needs
          # confirmation rounds for its own files. When only a subset of this
          # shard has significant deltas, rerun just those files for
          # confirmation. The published comparison is produced once by the post
          # job over every shard's raw round files.
          echo "::group::Preliminary comparison (shard $PERF_SHARD_INDEX)"
          pnpm -F app run perf-compare
          significant_files="$(
            node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const summary = JSON.parse(
            readFileSync("app/.perf-results/comparison.json", "utf-8"),
          );

          if (!Array.isArray(summary.rows)) {
            throw new Error("Missing comparison rows.");
          }

          const files = new Set();
          for (const row of summary.rows) {
            if (!row?.significant) continue;
            if (!row.testFile) {
              throw new Error("Missing test file for significant comparison row.");
            }
            files.add(row.testFile);
          }
          for (const file of [...files].sort()) {
            console.log(file);
          }
          NODE
          )"
          CONFIRMATION_FILES=()
          if [ -n "$significant_files" ]; then
            mapfile -t CONFIRMATION_FILES <<< "$significant_files"
          fi
          echo "::endgroup::"

          if [ ${#CONFIRMATION_FILES[@]} -gt 0 ]; then
            echo "Significant changes detected; running confirmation rounds for: ${CONFIRMATION_FILES[*]}"
            start_round=$((PERF_INITIAL_ROUNDS + 1))
            end_round=$((PERF_INITIAL_ROUNDS + PERF_CONFIRMATION_ROUNDS))
            for i in $(seq "$start_round" "$end_round"); do
              run_perf_rounds "$i" "${CONFIRMATION_FILES[@]}"
            done
          else
            echo "No significant changes detected; skipping confirmation rounds."
          fi

          manifest_status=success
          manifest_message=""

      - name: Upload shard round results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-chrome-rounds-${{ matrix.shard }}
          path: |
            app/.perf-results/shard-*-manifest.json
            app/.perf-results/baseline-*.json
            app/.perf-results/current-*.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 7

  node:
    name: Node
    needs: [node-baseline]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    env:
      # Clean runs stop after two paired rounds. Significant deltas get three
      # extra confirmation rounds before the PR comment is published.
      PERF_INITIAL_ROUNDS: 2
      PERF_CONFIRMATION_ROUNDS: 3
      PERF_RESULTS_TITLE: Node
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Set up baseline worktree
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          BASELINE_DIR="$RUNNER_TEMP/perf-node-baseline"
          echo "BASELINE_DIR=$BASELINE_DIR" >> "$GITHUB_ENV"
          git fetch --depth=1 origin "$BASE_SHA" || git fetch origin "$BASE_REF"
          git worktree add --detach "$BASELINE_DIR" "$BASE_SHA"

      - name: Install dependencies (baseline)
        working-directory: ${{ runner.temp }}/perf-node-baseline
        env:
          # The baseline worktree shares `.git/config` with the main checkout,
          # so husky's prepare step would otherwise rewrite `core.hooksPath`
          # to a relative path under a temporary worktree.
          HUSKY: 0
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Download baseline artifacts
        uses: actions/download-artifact@v8
        with:
          name: perf-node-baseline-build
          path: ${{ runner.temp }}/perf-node-baseline-build

      - name: Extract baseline artifacts
        run: |
          tar -xzf \
            "${{ runner.temp }}/perf-node-baseline-build/perf-node-baseline-build.tar.gz" \
            -C "$BASELINE_DIR"

      - name: Run interleaved benchmarks
        run: |
          mkdir -p .perf-results

          run_baseline_bench_round() {
            local i="$1"

            echo "::group::Round $i - baseline"
            local baseline_failed=0
            if ! (
              cd "$BASELINE_DIR" || exit 1
              pnpm exec vitest bench \
                --config vitest.bench.config.ts \
                --outputJson "$GITHUB_WORKSPACE/.perf-results/baseline-$i.json"
            ); then
              echo "::warning::Baseline benchmark run failed for round $i; writing an empty baseline."
              baseline_failed=1
            fi
            if [ "$baseline_failed" -eq 1 ] || [ ! -f ".perf-results/baseline-$i.json" ]; then
              if [ "$baseline_failed" -eq 0 ]; then
                echo "::warning::No baseline benchmark results for round $i; writing an empty baseline."
              fi
              printf '{"files":[]}\n' > ".perf-results/baseline-$i.json"
            fi
            echo "::endgroup::"
          }

          run_current_bench_round() {
            local i="$1"

            echo "::group::Round $i - current"
            pnpm exec vitest bench \
              --config vitest.bench.config.ts \
              --outputJson ".perf-results/current-$i.json"
            if [ ! -f ".perf-results/current-$i.json" ]; then
              echo "Missing current benchmark results for round $i" >&2
              exit 1
            fi
            echo "::endgroup::"
          }

          run_bench_round() {
            local i="$1"

            # Alternate sides first so same-runner drift cannot consistently
            # favor the baseline or current run across every paired round.
            if [ "$(( i % 2 ))" -eq 1 ]; then
              echo "Round $i order: baseline -> current"
              run_baseline_bench_round "$i"
              run_current_bench_round "$i"
            else
              echo "Round $i order: current -> baseline"
              run_current_bench_round "$i"
              run_baseline_bench_round "$i"
            fi
          }

          for i in $(seq 1 "$PERF_INITIAL_ROUNDS"); do
            run_bench_round "$i"
          done

          echo "::group::Preliminary comparison"
          pnpm exec ariakit perf-compare --node
          has_significant_changes=$(
            node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const summary = JSON.parse(
            readFileSync(".perf-results/comparison.json", "utf-8"),
          );

          console.log(summary.hasSignificantChanges ? "true" : "false");
          NODE
          )
          echo "::endgroup::"

          if [ "$has_significant_changes" = "true" ]; then
            echo "Significant benchmark changes detected; running confirmation rounds."
            start_round=$((PERF_INITIAL_ROUNDS + 1))
            end_round=$((PERF_INITIAL_ROUNDS + PERF_CONFIRMATION_ROUNDS))
            for i in $(seq "$start_round" "$end_round"); do
              run_bench_round "$i"
            done

            echo "::group::Final comparison"
            pnpm exec ariakit perf-compare --node
            echo "::endgroup::"
          else
            echo "No significant changes detected; skipping confirmation rounds."
          fi

      - name: Write performance metadata
        if: always()
        run: |
          mkdir -p .perf-results
          printf '%s\n' "$PERF_RESULTS_TITLE" > .perf-results/title.txt

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results-node
          path: .perf-results
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 7

  post:
    name: Post PR comment
    # Chrome shards upload raw `perf-chrome-rounds-*` artifacts that this job
    # compares into a Chrome section; the Node job uploads a pre-computed
    # `perf-results-node` artifact. Future perf jobs can do either.
    needs: [chrome, node]
    if: >
      always() &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      # Download both engines' artifacts before comparing, so a Chrome-side
      # problem can never prevent the Node section from being posted.
      - name: Download Node performance results
        # Only publish Node results when the Node job fully succeeded. Its
        # artifact is uploaded with `if: always()` and may hold a stale
        # preliminary comparison if a later confirmation round failed.
        if: needs.node.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: perf-results-node
          path: ${{ runner.temp }}/perf-results/perf-results-node

      - name: Download Chrome shard round results
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: perf-chrome-rounds-*
          path: ${{ runner.temp }}/perf-chrome-rounds
          merge-multiple: true

      - name: Compare Chrome perf results
        # Never let a Chrome comparison failure abort the job before the Node
        # section is posted; on failure the Chrome section is marked
        # inconclusive instead.
        continue-on-error: true
        env:
          PERF_CHROME_RESULT: ${{ needs.chrome.result }}
          PERF_RESULTS_DIR: ${{ runner.temp }}/perf-results
          PERF_SOURCE_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}
        run: |
          shopt -s nullglob
          output_dir="$PERF_RESULTS_DIR/perf-results-chrome"
          write_chrome_inconclusive() {
            mkdir -p "$output_dir"
            {
              echo "## Performance"
              echo ""
              echo ":warning: Chrome perf inconclusive: $1"
            } > "$output_dir/comparison.md"
            printf 'Chrome\n' > "$output_dir/title.txt"
          }

          if [ "$PERF_CHROME_RESULT" != "success" ]; then
            write_chrome_inconclusive "Chrome shard job result was $PERF_CHROME_RESULT."
            exit 0
          fi

          manifests=("$RUNNER_TEMP"/perf-chrome-rounds/shard-*-manifest.json)
          if ! validation_message="$(
            node --input-type=module - "${manifests[@]}" <<'NODE'
          import { existsSync, readFileSync } from "node:fs";
          import path from "node:path";

          const manifests = process.argv.slice(2).map((file) => {
            return {
              file,
              data: JSON.parse(readFileSync(file, "utf-8")),
            };
          });
          if (manifests.length === 0) {
            console.log("no shard manifests found.");
            process.exit(0);
          }
          const issues = [];
          const byShard = new Map();
          for (const { data: manifest, file } of manifests) {
            if (byShard.has(manifest.shard)) {
              issues.push(`duplicate shard manifest: ${manifest.shard}`);
            }
            byShard.set(manifest.shard, manifest);
            if (manifest.status !== "success" && manifest.status !== "skipped") {
              const message = manifest.message ? ` (${manifest.message})` : "";
              issues.push(`failed shard: ${manifest.shard}${message}`);
            }
            if (manifest.status === "success") {
              const roundFiles = Array.isArray(manifest.roundFiles)
                ? manifest.roundFiles
                : [];
              if (roundFiles.length === 0) {
                issues.push(
                  `missing round file list for shard: ${manifest.shard}`,
                );
              }
              const seenRoundFiles = new Set();
              for (const roundFile of roundFiles) {
                if (typeof roundFile !== "string" || roundFile.includes("/")) {
                  issues.push(
                    `invalid round file for shard ${manifest.shard}: ${roundFile}`,
                  );
                  continue;
                }
                if (seenRoundFiles.has(roundFile)) {
                  issues.push(
                    `duplicate round file for shard ${manifest.shard}: ${roundFile}`,
                  );
                }
                seenRoundFiles.add(roundFile);
                const roundPath = path.join(path.dirname(file), roundFile);
                if (!existsSync(roundPath)) {
                  issues.push(
                    `missing round file for shard ${manifest.shard}: ${roundFile}`,
                  );
                }
              }
            }
          }
          const totals = new Set(
            manifests.map(({ data: manifest }) => manifest.total),
          );
          if (totals.size > 1) {
            const sortedTotals = [...totals].sort((a, b) => a - b);
            issues.push(
              `inconsistent shard totals: ${sortedTotals.join(", ")}`,
            );
          }
          const total = [...totals][0];
          if (!Number.isInteger(total) || total < 1) {
            issues.push(`invalid shard total: ${total}`);
          } else {
            const missing = [];
            for (let shard = 1; shard <= total; shard += 1) {
              if (!byShard.has(shard)) {
                missing.push(shard);
              }
            }
            if (missing.length > 0) {
              issues.push(`missing shard manifest(s): ${missing.join(", ")}`);
            }
          }
          if (issues.length > 0) {
            console.log(issues.join("; "));
          }
          NODE
          )"; then
            write_chrome_inconclusive "shard manifest validation failed."
            exit 0
          fi
          if [ -n "$validation_message" ]; then
            write_chrome_inconclusive "$validation_message"
            exit 0
          fi

          rounds=(
            "$RUNNER_TEMP"/perf-chrome-rounds/baseline-*.json
            "$RUNNER_TEMP"/perf-chrome-rounds/current-*.json
          )
          if [ ${#rounds[@]} -eq 0 ]; then
            write_chrome_inconclusive "no Chrome shard rounds found."
            exit 0
          fi
          rm -rf app/.perf-results
          mkdir -p app/.perf-results
          cp "${rounds[@]}" app/.perf-results/
          if ! pnpm -F app run perf-compare; then
            write_chrome_inconclusive "comparison failed."
            exit 0
          fi
          mkdir -p "$output_dir"
          cp app/.perf-results/comparison.md "$output_dir/"
          printf 'Chrome\n' > "$output_dir/title.txt"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ARIAKIT_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.ARIAKIT_CI_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: write

      - name: Post or update PR comment
        uses: actions/github-script@v9
        env:
          PERF_RESULTS_DIR: ${{ runner.temp }}/perf-results
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- perf-results -->';
            const resultsDir = process.env.PERF_RESULTS_DIR;

            function formatName(name) {
              return name
                .replace(/^perf-results-/, '')
                .split('-')
                .filter(Boolean)
                .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
            }

            function readTitle(dir, fallback) {
              try {
                const title = fs.readFileSync(path.join(dir, 'title.txt'), 'utf-8').trim();
                return title || fallback;
              } catch {
                return fallback;
              }
            }

            function formatBody(body) {
              return body.replace(/^## Performance\s+/, '').trim();
            }

            function readComparison(file, title, options = {}) {
              try {
                const body = formatBody(fs.readFileSync(file, 'utf-8'));
                return { title, body };
              } catch {
                if (!options.optional) {
                  core.warning(`No performance comparison found for ${title}.`);
                }
              }
            }

            function readSections() {
              let entries;
              try {
                entries = fs.readdirSync(resultsDir, { withFileTypes: true });
              } catch {
                return [];
              }

              const groups = new Map();
              function addComparison(comparison) {
                if (!comparison) return;
                const bodies = groups.get(comparison.title) ?? [];
                bodies.push(comparison.body);
                groups.set(comparison.title, bodies);
              }

              for (const entry of entries
                .filter((entry) => entry.isDirectory())
                .filter((entry) =>
                  fs.existsSync(path.join(resultsDir, entry.name, 'comparison.md')),
                )
                .sort((a, b) => a.name.localeCompare(b.name))) {
                  const dir = path.join(resultsDir, entry.name);
                  const title = readTitle(dir, formatName(entry.name));
                  const file = path.join(dir, 'comparison.md');
                  const section = readComparison(file, title);
                  addComparison(section);
                }
              return Array.from(groups, ([title, bodies]) => {
                return `### ${title}\n\n${bodies.join('\n\n')}`;
              });
            }

            const sections = readSections();
            if (!sections.length) {
              core.notice('No performance comparisons found; leaving the PR comment unchanged.');
              return;
            }
            const content = `## Performance\n\n${sections.join('\n\n')}`;
            const body = `${marker}\n${content}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const matches = comments.filter(
              (comment) =>
                comment.body?.includes(marker) &&
                comment.user?.login === 'ariakito[bot]',
            );
            const existing = matches.at(-1);

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
