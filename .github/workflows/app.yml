name: app

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Vizzly is an alternative visual baseline backend. When disabled, this
  # workflow falls back to file-based screenshots committed in the repo.
  USE_VIZZLY: ${{ vars.USE_VIZZLY || 'false' }}
  VIZZLY_TOKEN: ${{ secrets.VIZZLY_TOKEN }}
  VIZZLY_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
  VIZZLY_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id }}
  VIZZLY_BRANCH: ${{ github.head_ref || github.ref_name }}
  VIZZLY_PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Build app
        run: pnpm -F site run build-lite

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-dist
          path: site/dist
          retention-days: 7
          include-hidden-files: true

  build-nextjs:
    name: Build Next.js app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Build Next.js app
        run: pnpm -F nextjs run build-worker

      - name: Upload Next.js artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-dist
          path: nextjs/.open-next
          retention-days: 7
          include-hidden-files: true

  test:
    name: Test ${{ matrix.name }}
    needs: [build, build-nextjs]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Chrome
            engine: chromium
            project: chrome
            test: xvfb-run pnpm -F site run test
            visual: xvfb-run pnpm -F site run test-visual
          - os: ubuntu-latest
            name: Firefox
            engine: firefox
            project: firefox
            test: xvfb-run pnpm -F site run test
            visual: xvfb-run pnpm -F site run test-visual
          # - os: ubuntu-latest
          #   name: Android
          #   engine: chromium
          #   project: android
          #   run: xvfb-run pnpm -F site run test-visual
          - os: macos-latest
            name: Safari
            engine: webkit
            project: safari
            test: pnpm -F site run test
            visual: pnpm -F site run test-visual
          # - os: macos-latest
          #   name: iOS
          #   engine: webkit
          #   project: ios
          #   test: pnpm -F site run test
          #   visual: pnpm -F site run test-visual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Install Playwright
        uses: ./.github/workflows/install-playwright
        with:
          engine: ${{ matrix.engine }}

      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: app-dist
          path: site/dist

      - name: Download Next.js artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-dist
          path: nextjs/.open-next

      - name: Test
        id: test
        run: ${{ matrix.test }} --project ${{ matrix.project }} --pass-with-no-tests --grep-invert @visual

      - name: Test visual
        id: test-visual
        # Vizzly aggregates per-browser results under a shared parallel run.
        run: |
          if [ "$USE_VIZZLY" = "true" ]; then
            pnpm exec vizzly run \
            --allow-no-token \
            --parallel-id="${{ github.run_id }}-${{ github.run_attempt }}" \
            "${{ matrix.visual }} --project ${{ matrix.project }} --grep @visual --pass-with-no-tests"
          else
            # -x stops after the first failing test so we can rerun once with -u below.
            ${{ matrix.visual }} --project ${{ matrix.project }} --grep @visual --pass-with-no-tests -x
          fi

      - name: Update screenshots
        id: update-screenshots
        if: failure() && steps.test-visual.outcome == 'failure' && env.USE_VIZZLY != 'true'
        # Record the pre-update timestamp so we can delete stale screenshots
        # that are no longer regenerated by this rerun.
        run: |
          touch -t "$(date -u -d '-1 second' '+%Y%m%d%H%M.%S' 2>/dev/null || date -u -v-1S '+%Y%m%d%H%M.%S')" "${{ runner.temp }}/pre-update-marker"
          ${{ matrix.visual }} --project ${{ matrix.project }} --grep @visual -u

      - name: Remove stale screenshots
        if: always() && steps.update-screenshots.outcome == 'success' && env.USE_VIZZLY != 'true'
        # The update run only touches files that still exist, so remove any
        # older screenshots for this browser that were left behind.
        run: find site/src -path "*/__screenshots__/*-${{ matrix.project }}.png" ! -newer "${{ runner.temp }}/pre-update-marker" -delete

      - name: Pack screenshots
        if: always() && env.USE_VIZZLY != 'true'
        # The follow-up job applies screenshots from artifacts instead of
        # mutating the branch directly from each matrix shard.
        run: |
          mkdir -p "${{ runner.temp }}/artifacts"
          python <<'PY'
          import sys
          import tarfile
          from pathlib import Path

          project = "${{ matrix.project }}"
          root = Path("site/src")
          archive_path = Path("${{ runner.temp }}/artifacts") / f"app-visual-{project}.tar.gz"
          screenshots = sorted(root.glob(f"**/__screenshots__/*-{project}.png"))
          if not screenshots:
              sys.exit(0)
          with tarfile.open(archive_path, "w:gz") as tar:
              for screenshot in screenshots:
                  tar.add(screenshot, arcname=screenshot.as_posix())
          PY

      - name: Upload screenshots
        if: always() && env.USE_VIZZLY != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: app-visual-${{ matrix.project }}
          path: ${{ runner.temp }}/artifacts/app-visual-${{ matrix.project }}.tar.gz
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload test results to GitHub
        if: failure() && (steps.test.outcome == 'failure' || steps.test-visual.outcome == 'failure' || steps.update-screenshots.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}-test-results
          path: site/test-results
          retention-days: 7

  test-finalize:
    # This job intentionally assumes PRs come from branches on this repository.
    # Fork-safe write-back logic was removed with the member-only PR model.
    name: Visual
    needs: test
    if: always() && needs.test.result != 'cancelled'
    permissions:
      actions: read
      contents: write
      pull-requests: write
    uses: ./.github/workflows/visual.yml
    with:
      event: ${{ github.event_name }}
      test-result: ${{ needs.test.result }}
    secrets: inherit

  perf:
    name: Performance
    needs: [build, build-nextjs]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Install Playwright
        uses: ./.github/workflows/install-playwright
        with:
          engine: chromium

      # --- Baseline (base branch) ---
      - name: Checkout base branch
        run: git checkout ${{ github.event.pull_request.base.sha }}

      - name: Set up base environment
        uses: ./.github/workflows/setup

      - name: Install Playwright (base)
        uses: ./.github/workflows/install-playwright
        with:
          engine: chromium

      - name: Find base app artifact
        id: find-base-artifact
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'app.yml',
              branch: '${{ github.event.pull_request.base.ref }}',
              status: 'success',
              per_page: 1,
            });
            const run = runs.data.workflow_runs[0];
            if (!run) {
              core.setFailed('No successful run found');
              return;
            }
            core.setOutput('run-id', run.id);

      - name: Download base app artifact
        id: base-artifact
        if: steps.find-base-artifact.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: app-dist
          path: site/dist
          github-token: ${{ github.token }}
          run-id: ${{ steps.find-base-artifact.outputs.run-id }}

      - name: Download base Next.js artifact
        id: base-nextjs-artifact
        if: steps.find-base-artifact.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: nextjs-dist
          path: nextjs/.open-next
          github-token: ${{ github.token }}
          run-id: ${{ steps.find-base-artifact.outputs.run-id }}

      - name: Clean partial base artifacts
        if: steps.base-artifact.outcome != 'success' || steps.base-nextjs-artifact.outcome != 'success'
        run: rm -rf site/dist nextjs/.open-next

      - name: Build base app
        if: steps.base-artifact.outcome != 'success' || steps.base-nextjs-artifact.outcome != 'success'
        run: pnpm -F site run build-lite

      - name: Build base Next.js app
        if: steps.base-artifact.outcome != 'success' || steps.base-nextjs-artifact.outcome != 'success'
        run: pnpm -F nextjs run build-worker

      - name: Run baseline perf tests
        # Baseline failures are expected when perf tests are new.
        run: |
          PERF_RESULTS_FILE=baseline.json \
          xvfb-run pnpm -F site run test-perf --pass-with-no-tests || true

      - name: Save baseline results
        run: |
          mkdir -p /tmp/perf-baseline
          cp site/.perf-results/baseline*.json /tmp/perf-baseline/ 2>/dev/null || true

      # --- Current (PR branch) ---
      - name: Checkout PR branch
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Set up PR environment
        uses: ./.github/workflows/setup

      - name: Clean base app artifacts
        run: rm -rf site/dist nextjs/.open-next

      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: app-dist
          path: site/dist

      - name: Download Next.js artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-dist
          path: nextjs/.open-next

      - name: Restore baseline results
        run: |
          mkdir -p site/.perf-results
          cp /tmp/perf-baseline/*.json site/.perf-results/ 2>/dev/null || true

      - name: Run current perf tests
        run: |
          PERF_RESULTS_FILE=current.json \
          xvfb-run pnpm -F site run test-perf --pass-with-no-tests

      - name: Compare results
        if: always()
        run: pnpm -F site run perf-compare

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ARIAKIT_BOT_PAT }}
          script: |
            const fs = require('fs');
            const marker = '<!-- perf-results -->';
            let body;
            try {
              body = fs.readFileSync('site/.perf-results/comparison.md', 'utf-8');
            } catch {
              body = 'No performance results available.';
            }
            body = marker + '\n' + body;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy-preview:
    # Preview deployments and commit statuses intentionally run only under the
    # same-repo PR model adopted by this repository.
    name: Preview
    needs: [build, build-nextjs]
    if: always()
    permissions:
      actions: read
      contents: read
      deployments: write
      statuses: write
    uses: ./.github/workflows/deploy-preview.yml
    secrets: inherit
