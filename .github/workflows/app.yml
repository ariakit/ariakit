name: app

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  USE_VIZZLY: ${{ vars.USE_VIZZLY || 'false' }}
  VIZZLY_TOKEN: ${{ secrets.VIZZLY_TOKEN }}
  VIZZLY_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
  VIZZLY_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id }}
  VIZZLY_BRANCH: ${{ github.head_ref || github.ref_name }}
  VIZZLY_PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  install-linux:
    name: Install node modules (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install node modules
        uses: ./.github/workflows/install-node-modules
        with:
          cache-npm: true

  # install-macos:
  #   name: Install node modules (macOS)
  #   runs-on: macos-latest
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v6

  #     - name: Install node modules
  #       uses: ./.github/workflows/install-node-modules
  #       with:
  #         cache-npm: true

  build:
    name: Build app
    needs: install-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install node modules
        uses: ./.github/workflows/install-node-modules

      - name: Build app
        run: npm run build-lite -w site

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-dist
          path: site/dist
          retention-days: 7
          include-hidden-files: true

  build-nextjs:
    name: Build Next.js app
    needs: install-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install node modules
        uses: ./.github/workflows/install-node-modules

      - name: Build Next.js app
        run: npm run build-worker -w nextjs

      - name: Upload Next.js artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-dist
          path: nextjs/.open-next
          retention-days: 7
          include-hidden-files: true

  test:
    name: Test ${{ matrix.name }}
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Chrome
            engine: chromium
            project: chrome
            test: xvfb-run npm run test -w site --
            visual: xvfb-run npm run test-visual -w site --
          - os: ubuntu-latest
            name: Firefox
            engine: firefox
            project: firefox
            test: xvfb-run npm run test -w site --
            visual: xvfb-run npm run test-visual -w site --
          # - os: ubuntu-latest
          #   name: Android
          #   engine: chromium
          #   project: android
          #   run: xvfb-run npm run test-visual -w site --
          - os: macos-latest
            name: Safari
            engine: webkit
            project: safari
            test: npm run test -w site --
            visual: npm run test-visual -w site --
          # - os: macos-latest
          #   name: iOS
          #   engine: webkit
          #   project: ios
          #   run: npm run test-visual -w site --
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install node modules
        uses: ./.github/workflows/install-node-modules

      - name: Install Playwright
        uses: ./.github/workflows/install-playwright
        with:
          engine: ${{ matrix.engine }}

      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: app-dist
          path: site/dist

      - name: Test
        id: test
        run: ${{ matrix.test }} --project ${{ matrix.project }} --pass-with-no-tests --grep-invert @visual

      - name: Test visual
        id: test-visual
        env:
          PROJECT: ${{ matrix.project }}
          VISUAL_COMMAND: ${{ matrix.visual }}
        run: node --experimental-strip-types .github/scripts/app.ts test-visual

      - name: Reset snapshots
        if: failure() && steps.test-visual.outcome == 'failure' && env.USE_VIZZLY != 'true'
        env:
          PROJECT: ${{ matrix.project }}
        run: node --experimental-strip-types .github/scripts/app.ts reset-snapshots

      - name: Update snapshots
        id: update-snapshots
        if: failure() && steps.test-visual.outcome == 'failure' && env.USE_VIZZLY != 'true'
        run: ${{ matrix.visual }} --project ${{ matrix.project }} --grep @visual -u

      - name: Pack snapshots
        if: always() && env.USE_VIZZLY != 'true'
        env:
          PROJECT: ${{ matrix.project }}
          ARTIFACTS_DIR: ${{ runner.temp }}/artifacts
        run: node --experimental-strip-types .github/scripts/app.ts pack-snapshots

      - name: Upload snapshots
        if: always() && env.USE_VIZZLY != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: app-visual-${{ matrix.project }}
          path: ${{ runner.temp }}/artifacts/app-visual-${{ matrix.project }}.tar.gz
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload test results to GitHub
        if: failure() && (steps.test.outcome == 'failure' || steps.test-visual.outcome == 'failure' || steps.update-snapshots.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}-test-results
          path: site/test-results
          retention-days: 7

  test-finalize:
    name: Finalize visual tests
    needs: test
    if: always() && needs.test.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        if: env.VIZZLY_TOKEN != '' && env.USE_VIZZLY == 'true'
        uses: actions/checkout@v6

      - name: Install node modules
        if: env.VIZZLY_TOKEN != '' && env.USE_VIZZLY == 'true'
        uses: ./.github/workflows/install-node-modules

      - name: Finalize visual tests
        if: env.VIZZLY_TOKEN != '' && env.USE_VIZZLY == 'true'
        run: npx vizzly finalize "${{ github.run_id }}-${{ github.run_attempt }}"
