name: app

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Vizzly is an alternative visual baseline backend. When disabled, this
  # workflow falls back to file-based screenshots committed in the repo.
  USE_VIZZLY: ${{ vars.USE_VIZZLY || 'false' }}
  VIZZLY_TOKEN: ${{ secrets.VIZZLY_TOKEN }}
  VIZZLY_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
  VIZZLY_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id }}
  VIZZLY_BRANCH: ${{ github.head_ref || github.ref_name }}
  VIZZLY_PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Build app
        run: pnpm -F site run build-lite

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-dist
          path: site/dist
          retention-days: 7
          include-hidden-files: true

  build-nextjs:
    name: Build Next.js app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Build Next.js app
        run: pnpm -F nextjs run build-worker

      - name: Upload Next.js artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-dist
          path: nextjs/.open-next
          retention-days: 7
          include-hidden-files: true

  test:
    name: Test ${{ matrix.name }}
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Chrome
            engine: chromium
            project: chrome
            test: xvfb-run pnpm -F site run test
            visual: xvfb-run pnpm -F site run test-visual
          - os: ubuntu-latest
            name: Firefox
            engine: firefox
            project: firefox
            test: xvfb-run pnpm -F site run test
            visual: xvfb-run pnpm -F site run test-visual
          # - os: ubuntu-latest
          #   name: Android
          #   engine: chromium
          #   project: android
          #   run: xvfb-run pnpm -F site run test-visual
          - os: macos-latest
            name: Safari
            engine: webkit
            project: safari
            test: pnpm -F site run test
            visual: pnpm -F site run test-visual
          # - os: macos-latest
          #   name: iOS
          #   engine: webkit
          #   project: ios
          #   test: pnpm -F site run test
          #   visual: pnpm -F site run test-visual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Install Playwright
        uses: ./.github/workflows/install-playwright
        with:
          engine: ${{ matrix.engine }}

      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: app-dist
          path: site/dist

      - name: Test
        id: test
        run: ${{ matrix.test }} --project ${{ matrix.project }} --pass-with-no-tests --grep-invert @visual

      - name: Test visual
        id: test-visual
        # Vizzly aggregates per-browser results under a shared parallel run.
        run: |
          if [ "$USE_VIZZLY" = "true" ]; then
            pnpm exec vizzly run \
            --allow-no-token \
            --parallel-id="${{ github.run_id }}-${{ github.run_attempt }}" \
            "${{ matrix.visual }} --project ${{ matrix.project }} --grep @visual --pass-with-no-tests"
          else
            # -x stops after the first failing test so we can rerun once with -u below.
            ${{ matrix.visual }} --project ${{ matrix.project }} --grep @visual --pass-with-no-tests -x
          fi

      - name: Update screenshots
        id: update-screenshots
        if: failure() && steps.test-visual.outcome == 'failure' && env.USE_VIZZLY != 'true'
        # Record the pre-update timestamp so we can delete stale screenshots
        # that are no longer regenerated by this rerun.
        run: |
          touch -t "$(date -u -d '-1 second' '+%Y%m%d%H%M.%S' 2>/dev/null || date -u -v-1S '+%Y%m%d%H%M.%S')" "${{ runner.temp }}/pre-update-marker"
          ${{ matrix.visual }} --project ${{ matrix.project }} --grep @visual -u

      - name: Remove stale screenshots
        if: always() && steps.update-screenshots.outcome == 'success' && env.USE_VIZZLY != 'true'
        # The update run only touches files that still exist, so remove any
        # older screenshots for this browser that were left behind.
        run: find site/src -path "*/__screenshots__/*-${{ matrix.project }}.png" ! -newer "${{ runner.temp }}/pre-update-marker" -delete

      - name: Pack screenshots
        if: always() && env.USE_VIZZLY != 'true'
        run: |
          # The follow-up job applies screenshots from artifacts instead of
          # mutating the branch directly from each matrix shard.
          mkdir -p "${{ runner.temp }}/artifacts"
          python <<'PY'
          import sys
          import tarfile
          from pathlib import Path

          project = "${{ matrix.project }}"
          root = Path("site/src")
          archive_path = Path("${{ runner.temp }}/artifacts") / f"app-visual-{project}.tar.gz"
          screenshots = sorted(root.glob(f"**/__screenshots__/*-{project}.png"))
          if not screenshots:
              sys.exit(0)
          with tarfile.open(archive_path, "w:gz") as tar:
              for screenshot in screenshots:
                  tar.add(screenshot, arcname=screenshot.as_posix())
          PY

      - name: Upload screenshots
        if: always() && env.USE_VIZZLY != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: app-visual-${{ matrix.project }}
          path: ${{ runner.temp }}/artifacts/app-visual-${{ matrix.project }}.tar.gz
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload test results to GitHub
        if: failure() && (steps.test.outcome == 'failure' || steps.test-visual.outcome == 'failure' || steps.update-screenshots.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.project }}-test-results
          path: site/test-results
          retention-days: 7

  test-finalize:
    name: Finalize visual tests
    needs: test
    if: always() && needs.test.result != 'cancelled'
    permissions:
      actions: read
      contents: write
      pull-requests: write
    uses: ./.github/workflows/visual.yml
    with:
      test-result: ${{ needs.test.result }}
    secrets: inherit

  deploy-preview:
    name: Deploy preview
    needs: [build, build-nextjs]
    if: always()
    runs-on: ubuntu-latest
    environment: Preview
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
    permissions:
      actions: read
      contents: read
      deployments: write
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set commit status (pending)
        # Preview statuses are created eagerly so the commit shows a stable
        # target URL even when deployment finishes later in the job.
        uses: actions/github-script@v8
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        with:
          script: |
            const { SERVER_URL, REPO, RUN_ID, HEAD_SHA } = process.env;
            const runUrl = `${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}`;
            const args = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: HEAD_SHA,
              state: 'pending',
              target_url: runUrl,
            };
            await github.rest.repos.createCommitStatus({ ...args, context: 'Preview (commit)' });
            await github.rest.repos.createCommitStatus({ ...args, context: 'Preview (branch)' });

      - name: Generate preview alias
        id: alias
        if: (github.head_ref || github.ref_name) != 'main'
        env:
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
        # Non-main branches get a deterministic Cloudflare preview alias so
        # the branch status can point at a stable branch URL.
        run: |
          SAFE=$(printf "%s" "$HEAD_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9-]+#-#g' | sed -E 's#^-+##; s#-+$##')
          echo "slug=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Download Next.js app artifact
        id: download-nextjs-artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nextjs-dist
          path: nextjs/.open-next

      - name: Download app artifact
        id: download-app-artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: app-dist
          path: site/dist

      - name: Upload Next.js app version
        id: versions-nextjs
        if: steps.download-nextjs-artifact.outcome == 'success'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: nextjs
          command: >-
            versions upload
            ${{ steps.alias.outputs.slug && format('--preview-alias {0}', steps.alias.outputs.slug) }}

      - name: Upload app version
        id: versions
        if: steps.download-app-artifact.outcome == 'success'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            versions upload --env preview
            ${{ steps.alias.outputs.slug && format('--preview-alias {0}', steps.alias.outputs.slug) }}

      - name: Deploy Next.js app version
        if: steps.download-nextjs-artifact.outcome == 'success' && (github.head_ref || github.ref_name) == 'main'
        id: deploy-nextjs
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: nextjs
          command: deploy

      - name: Deploy app version
        if: steps.download-app-artifact.outcome == 'success' && (github.head_ref || github.ref_name) == 'main'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --env preview

      - name: Set commit status (result)
        if: always()
        # "Preview (commit)" points at the immutable version URL.
        # "Preview (branch)" prefers the stable alias URL and falls back to
        # the main-branch deployment URL when no alias exists.
        uses: actions/github-script@v8
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VERSIONS_SUCCESS: ${{ steps.versions.outcome == 'success' && steps.versions-nextjs.outcome == 'success' }}
          DEPLOY_SUCCESS: ${{ steps.deploy.outcome == 'success' && steps.deploy-nextjs.outcome == 'success' }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          VERSION_URL: ${{ steps.versions.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.alias.outputs.slug }}
        with:
          script: |
            const { SERVER_URL, REPO, RUN_ID, HEAD_SHA, VERSIONS_SUCCESS, DEPLOY_SUCCESS, DEPLOY_URL, VERSION_URL, ALIAS_URL } = process.env;
            const versionsSuccess = VERSIONS_SUCCESS === 'true';
            const deploySuccess = DEPLOY_SUCCESS === 'true';
            const runUrl = `${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}`;
            const deployUrl = DEPLOY_URL;
            const versionUrl = VERSION_URL;
            const aliasUrl = ALIAS_URL && versionUrl
              ? versionUrl.replace(/^(https?:\/\/)[^-]+/, `$1${ALIAS_URL}`)
              : '';
            const commitTarget = versionsSuccess && versionUrl
              ? versionUrl
              : '';
            const branchTarget = versionsSuccess && aliasUrl
              ? aliasUrl
              : deploySuccess && deployUrl ? deployUrl : '';
            const args = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: HEAD_SHA,
            };
            await github.rest.repos.createCommitStatus({
              ...args,
              state: commitTarget ? 'success' : 'failure',
              target_url: commitTarget || runUrl,
              context: 'Preview (commit)',
            });
            await github.rest.repos.createCommitStatus({
              ...args,
              state: branchTarget ? 'success' : 'failure',
              target_url: branchTarget || runUrl,
              context: 'Preview (branch)',
            });
