name: install-playwright
description: Install Playwright

inputs:
  engine:
    description: Engine
    required: true
  filter:
    description: Optional pnpm filter selector for locating Playwright
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Cache Playwright
      id: cache-playwright
      uses: actions/cache@v6
      with:
        path: |
          ${{ runner.os == 'macOS' && '~/Library/Caches/ms-playwright' || runner.os == 'Windows' && '~\\AppData\\Local\\ms-playwright' || '~/.cache/ms-playwright' }}
        key: playwright-${{ runner.os }}-${{ inputs.engine }}-${{ hashFiles('pnpm-lock.yaml', '.nvmrc') }}
        restore-keys: |
          playwright-${{ runner.os }}-${{ inputs.engine }}-
          playwright-${{ runner.os }}-

    - name: Install Playwright
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      shell: bash
      env:
        PLAYWRIGHT_FILTER: ${{ inputs.filter }}
      run: |
        if [ -n "$PLAYWRIGHT_FILTER" ]; then
          pnpm --filter "$PLAYWRIGHT_FILTER" exec playwright install --with-deps ${{ inputs.engine }}
        else
          pnpm exec playwright install --with-deps ${{ inputs.engine }}
        fi
