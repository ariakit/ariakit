name: release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    name: Version or publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ARIAKIT_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.ARIAKIT_CI_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Configure git
        run: |
          # Authentication controls who can push; git config controls the
          # author/committer recorded on the release commit.
          git config user.name "ariakito[bot]"
          git config user.email "283989922+ariakito[bot]@users.noreply.github.com"

      - name: Configure git authentication
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Create PR or publish to npm
        uses: changesets/action@v1
        with:
          title: Publish
          commit: Publish
          version: pnpm run version
          publish: pnpm run publish
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ""
