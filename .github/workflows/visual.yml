name: visual

on:
  workflow_run:
    workflows: ["app"]
    types: [completed]

env:
  USE_VIZZLY: ${{ vars.USE_VIZZLY || 'false' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  gate:
    name: Ignore stale commits
    permissions:
      contents: read
    if: github.event.workflow_run.head_repository.full_name == github.repository
    uses: ./.github/workflows/ignore-stale-commits.yml
    with:
      head_repository: ${{ github.event.workflow_run.head_repository.full_name }}
      head_branch: ${{ github.event.workflow_run.head_branch }}
      head_sha: ${{ github.event.workflow_run.head_sha }}

  update-snapshots:
    name: Update snapshots
    needs: gate
    if: needs.gate.outputs.is_latest == 'true' && vars.USE_VIZZLY != 'true' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Check for complete snapshot artifacts
        id: check-artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: node --experimental-strip-types .github/scripts/visual.ts check-artifacts

      - name: Checkout trusted repository
        if: steps.check-artifacts.outputs.ready == 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Checkout PR
        if: steps.check-artifacts.outputs.ready == 'true'
        uses: actions/checkout@v6
        with:
          path: pr
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Download snapshots
        if: steps.check-artifacts.outputs.ready == 'true'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: app-visual-*
          merge-multiple: true
          path: ${{ runner.temp }}/artifacts

      - name: Prepare screenshots
        if: steps.check-artifacts.outputs.ready == 'true'
        run: node --experimental-strip-types .github/scripts/visual.ts prepare-screenshots

      - name: Extract snapshots
        if: steps.check-artifacts.outputs.ready == 'true'
        env:
          ARTIFACTS_DIR: ${{ runner.temp }}/artifacts
        run: node --experimental-strip-types .github/scripts/visual.ts extract-snapshots

      - name: Commit or create PR
        if: steps.check-artifacts.outputs.ready == 'true'
        uses: ./.github/workflows/commit-or-pr
        with:
          working-directory: pr
          event: ${{ github.event.workflow_run.event }}
          message: Update snapshots
          head-branch: ${{ github.event.workflow_run.head_branch }}
          new-branch: visual/update-snapshots
          token: ${{ secrets.ARIAKIT_BOT_PAT }}

  wipe-snapshots:
    name: Wipe snapshots
    needs: gate
    if: needs.gate.outputs.is_latest == 'true' && vars.USE_VIZZLY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout trusted repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          path: pr
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Remove visual snapshot directories
        run: find pr/site/src -type d -name __screenshots__ -prune -exec rm -rf {} +

      - name: Commit or create PR
        uses: ./.github/workflows/commit-or-pr
        with:
          working-directory: pr
          event: ${{ github.event.workflow_run.event }}
          message: Remove file-based visual snapshots
          head-branch: ${{ github.event.workflow_run.head_branch }}
          new-branch: visual/remove-snapshots
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
