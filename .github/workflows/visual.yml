name: visual

on:
  workflow_run:
    workflows: ["app"]
    types: [completed]

env:
  USE_VIZZLY: ${{ vars.USE_VIZZLY || 'false' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  gate:
    name: Ignore stale commits
    permissions:
      contents: read
    if: github.event.workflow_run.head_repository.full_name == github.repository
    uses: ./.github/workflows/ignore-stale-commits.yml
    with:
      head_repository: ${{ github.event.workflow_run.head_repository.full_name }}
      head_branch: ${{ github.event.workflow_run.head_branch }}
      head_sha: ${{ github.event.workflow_run.head_sha }}

  update-snapshots:
    name: Update snapshots
    needs: gate
    if: needs.gate.outputs.is_latest == 'true' && env.USE_VIZZLY != 'true' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Check for snapshot artifacts
        id: check-artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const hasSnapshots = artifacts.data.artifacts.some((artifact) =>
              artifact.name.startsWith("app-visual-"),
            );
            console.log(
              `Found ${artifacts.data.artifacts.length} artifacts, hasSnapshots: ${hasSnapshots}`,
            );
            return hasSnapshots;
          result-encoding: string

      - name: Checkout trusted repository
        if: steps.check-artifacts.outputs.result == 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Checkout PR
        if: steps.check-artifacts.outputs.result == 'true'
        uses: actions/checkout@v6
        with:
          path: pr
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Download snapshots
        if: steps.check-artifacts.outputs.result == 'true'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: app-visual-*
          merge-multiple: true
          path: ${{ runner.temp }}/artifacts

      - name: Prepare screenshots
        if: steps.check-artifacts.outputs.result == 'true'
        run: find pr/site/src -type d -name __screenshots__ -prune -exec rm -rf {} +

      - name: Extract snapshots
        if: steps.check-artifacts.outputs.result == 'true'
        run: |
          find "${{ runner.temp }}/artifacts" -name "app-visual-*.tar.gz" \
            -exec tar -xzf {} -C pr \;

      - name: Commit or create PR
        if: steps.check-artifacts.outputs.result == 'true'
        uses: ./.github/workflows/commit-or-pr
        with:
          working-directory: pr
          event: ${{ github.event.workflow_run.event }}
          message: Update snapshots
          head-branch: ${{ github.event.workflow_run.head_branch }}
          new-branch: visual/update-snapshots
          token: ${{ secrets.ARIAKIT_BOT_PAT }}

  wipe-snapshots:
    name: Wipe snapshots
    needs: gate
    if: needs.gate.outputs.is_latest == 'true' && env.USE_VIZZLY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout trusted repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          path: pr
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Remove visual snapshot directories
        run: find pr/site/src -type d -name __screenshots__ -prune -exec rm -rf {} +

      - name: Commit or create PR
        uses: ./.github/workflows/commit-or-pr
        with:
          working-directory: pr
          event: ${{ github.event.workflow_run.event }}
          message: Remove file-based visual snapshots
          head-branch: ${{ github.event.workflow_run.head_branch }}
          new-branch: visual/remove-snapshots
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
