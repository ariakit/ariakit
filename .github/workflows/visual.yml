name: visual

on:
  workflow_run:
    workflows: ["app"]
    types: [completed]

env:
  USE_VIZZLY: ${{ vars.USE_VIZZLY || 'false' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  gate:
    name: Ignore stale commits
    permissions:
      contents: read
    if: github.event.workflow_run.head_repository.full_name == github.repository
    uses: ./.github/workflows/ignore-stale-commits.yml
    with:
      head_repository: ${{ github.event.workflow_run.head_repository.full_name }}
      head_branch: ${{ github.event.workflow_run.head_branch }}
      head_sha: ${{ github.event.workflow_run.head_sha }}

  update-snapshots:
    name: Update snapshots
    needs: gate
    if: needs.gate.outputs.is_latest == 'true' && env.USE_VIZZLY != 'true' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Check for complete snapshot artifacts
        id: check-artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const perPage = 100;
            // 20 pages is enough for 2,000 jobs/artifacts, which is far beyond
            // the size of this workflow run while still bounding API retries.
            const maxPages = 20;
            const listWorkflowRunJobs = async () => {
              const jobs = [];
              for (let page = 1; page <= maxPages; page += 1) {
                const response = await github.rest.actions.listJobsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: ${{ github.event.workflow_run.id }},
                  per_page: perPage,
                  page,
                });
                const pageJobs = response.data.jobs;
                jobs.push(...pageJobs);
                if (pageJobs.length < perPage) {
                  return jobs;
                }
              }
              throw new Error(
                `Exceeded workflow job pagination limit of ${maxPages} pages (${maxPages * perPage} jobs)`,
              );
            };
            const listWorkflowRunArtifacts = async () => {
              const artifacts = [];
              for (let page = 1; page <= maxPages; page += 1) {
                const response = await github.rest.actions.listWorkflowRunArtifacts({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: ${{ github.event.workflow_run.id }},
                  per_page: perPage,
                  page,
                });
                const pageArtifacts = response.data.artifacts;
                artifacts.push(...pageArtifacts);
                if (pageArtifacts.length < perPage) {
                  return artifacts;
                }
              }
              throw new Error(
                `Exceeded workflow artifact pagination limit of ${maxPages} pages (${maxPages * perPage} artifacts)`,
              );
            };
            const jobs = await listWorkflowRunJobs();
            const artifacts = await listWorkflowRunArtifacts();
            const snapshotJobs = jobs
              .filter((job) => job.steps?.some((step) => step.name === "Upload snapshots"))
              .map((job) => {
                const project = job.name.startsWith("Test ")
                  ? job.name.slice(5).toLowerCase()
                  : undefined;
                return {
                  name: job.name,
                  project,
                };
              });
            const invalidSnapshotJobs = snapshotJobs.filter((job) => !job.project);
            const expectedSnapshotArtifacts = snapshotJobs
              .filter((job) => job.project)
              .map((job) => job.project)
              .map((project) => `app-visual-${project}`);
            const snapshotArtifacts = artifacts
              .map((artifact) => artifact.name)
              .filter((artifact) => artifact.startsWith("app-visual-"));
            const missingSnapshotArtifacts = expectedSnapshotArtifacts.filter(
              (artifact) => !snapshotArtifacts.includes(artifact),
            );
            const hasCompleteSnapshots =
              invalidSnapshotJobs.length === 0 &&
              expectedSnapshotArtifacts.length > 0 &&
              missingSnapshotArtifacts.length === 0;
            if (invalidSnapshotJobs.length > 0) {
              console.log(
                `Unexpected snapshot job names: ${invalidSnapshotJobs.map((job) => job.name).join(", ")}`,
              );
            }
            console.log(
              `Expected snapshot artifacts: ${expectedSnapshotArtifacts.join(", ") || "(none)"}`,
            );
            console.log(
              `Found snapshot artifacts: ${snapshotArtifacts.join(", ") || "(none)"}`,
            );
            if (missingSnapshotArtifacts.length > 0) {
              console.log(
                `Missing snapshot artifacts: ${missingSnapshotArtifacts.join(", ")}`,
              );
            }
            core.setOutput("ready", String(hasCompleteSnapshots));

      - name: Checkout trusted repository
        if: steps.check-artifacts.outputs.ready == 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Checkout PR
        if: steps.check-artifacts.outputs.ready == 'true'
        uses: actions/checkout@v6
        with:
          path: pr
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Download snapshots
        if: steps.check-artifacts.outputs.ready == 'true'
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: app-visual-*
          merge-multiple: true
          path: ${{ runner.temp }}/artifacts

      - name: Prepare screenshots
        if: steps.check-artifacts.outputs.ready == 'true'
        run: find pr/site/src -type d -name __screenshots__ -prune -exec rm -rf {} +

      - name: Extract snapshots
        if: steps.check-artifacts.outputs.ready == 'true'
        run: |
          find "${{ runner.temp }}/artifacts" -name "app-visual-*.tar.gz" \
            -exec tar -xzf {} -C pr \;

      - name: Commit or create PR
        if: steps.check-artifacts.outputs.ready == 'true'
        uses: ./.github/workflows/commit-or-pr
        with:
          working-directory: pr
          event: ${{ github.event.workflow_run.event }}
          message: Update snapshots
          head-branch: ${{ github.event.workflow_run.head_branch }}
          new-branch: visual/update-snapshots
          token: ${{ secrets.ARIAKIT_BOT_PAT }}

  wipe-snapshots:
    name: Wipe snapshots
    needs: gate
    if: needs.gate.outputs.is_latest == 'true' && env.USE_VIZZLY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout trusted repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          path: pr
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Remove visual snapshot directories
        run: find pr/site/src -type d -name __screenshots__ -prune -exec rm -rf {} +

      - name: Commit or create PR
        uses: ./.github/workflows/commit-or-pr
        with:
          working-directory: pr
          event: ${{ github.event.workflow_run.event }}
          message: Remove file-based visual snapshots
          head-branch: ${{ github.event.workflow_run.head_branch }}
          new-branch: visual/remove-snapshots
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
