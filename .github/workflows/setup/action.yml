name: setup
description: Set up environment

inputs:
  install-filter:
    description: Optional pnpm filter selector for installing a workspace subset
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      with:
        cache: ${{ runner.os != 'macOS' }}

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: Install dependencies
      shell: bash
      env:
        INSTALL_FILTER: ${{ inputs.install-filter }}
      run: |
        if [ -n "$INSTALL_FILTER" ]; then
          pnpm install --frozen-lockfile --filter "$INSTALL_FILTER"
        else
          pnpm install --frozen-lockfile
        fi
