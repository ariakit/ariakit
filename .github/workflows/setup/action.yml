name: setup
description: Set up environment

inputs:
  install-filter:
    description: Optional space-separated pnpm filter selector(s) for installing a workspace subset
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      with:
        cache: ${{ runner.os != 'macOS' }}

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: Install dependencies
      shell: bash
      env:
        INSTALL_FILTER: ${{ inputs.install-filter }}
      run: |
        if [ -n "$INSTALL_FILTER" ]; then
          filter_args=()
          read -ra filters <<< "$INSTALL_FILTER"
          for filter in "${filters[@]}"; do
            filter_args+=(--filter "$filter")
          done
          pnpm install --frozen-lockfile "${filter_args[@]}"
        else
          pnpm install --frozen-lockfile
        fi
