name: apply-generated-patch

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name of the patch artifact to download
        required: true
        type: string
      patch-file:
        description: Name of the patch file inside the artifact
        required: true
        type: string
      message:
        description: Commit message and PR title
        required: true
        type: string
      event:
        description: Event type (push or pull_request)
        required: true
        type: string
      head-branch:
        description: Branch name when committing to an existing PR
        required: true
        type: string
      new-branch:
        description: Branch name when creating a new PR
        required: true
        type: string

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update generated files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.head-branch }}
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
          persist-credentials: false

      - name: Download patch artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ runner.temp }}/artifacts

      - name: Apply patch
        run: git apply "${{ runner.temp }}/artifacts/${{ inputs.patch-file }}"

      - name: Commit or create PR
        uses: ./.github/workflows/commit-or-pr
        with:
          event: ${{ inputs.event }}
          message: ${{ inputs.message }}
          head-branch: ${{ inputs.head-branch }}
          new-branch: ${{ inputs.new-branch }}
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
