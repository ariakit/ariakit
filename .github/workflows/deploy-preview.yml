name: deploy-preview

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: Preview
      url: ${{ steps.preview-url.outputs.commit_url }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
    permissions:
      actions: read
      contents: read
      deployments: write
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set commit status (pending)
        # Preview statuses are created eagerly so the commit shows a stable
        # target URL even when deployment finishes later in the job.
        uses: actions/github-script@v8
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        with:
          script: |
            const { SERVER_URL, REPO, RUN_ID, HEAD_SHA } = process.env;
            const runUrl = `${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}`;
            const args = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: HEAD_SHA,
              state: 'pending',
              target_url: runUrl,
            };
            await github.rest.repos.createCommitStatus({ ...args, context: 'Preview (commit)' });
            await github.rest.repos.createCommitStatus({ ...args, context: 'Preview (branch)' });

      - name: Generate preview alias
        id: alias
        if: (github.head_ref || github.ref_name) != 'main'
        env:
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
        # Non-main branches get a deterministic Cloudflare preview alias so
        # the branch status can point at a stable branch URL.
        run: |
          SAFE=$(printf "%s" "$HEAD_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9-]+#-#g' | sed -E 's#^-+##; s#-+$##')
          echo "slug=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Download Next.js app artifact
        id: download-nextjs-artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nextjs-dist
          path: nextjs/.open-next

      - name: Download app artifact
        id: download-app-artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: app-dist
          path: site/dist

      - name: Upload Next.js app version
        id: versions-nextjs
        if: steps.download-nextjs-artifact.outcome == 'success'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: nextjs
          command: >-
            versions upload
            ${{ steps.alias.outputs.slug && format('--preview-alias {0}', steps.alias.outputs.slug) }}

      - name: Upload app version
        id: versions
        if: steps.download-app-artifact.outcome == 'success'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            versions upload --env preview
            ${{ steps.alias.outputs.slug && format('--preview-alias {0}', steps.alias.outputs.slug) }}

      - name: Deploy Next.js app version
        if: steps.download-nextjs-artifact.outcome == 'success' && (github.head_ref || github.ref_name) == 'main'
        id: deploy-nextjs
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: nextjs
          command: deploy

      - name: Deploy app version
        if: steps.download-app-artifact.outcome == 'success' && (github.head_ref || github.ref_name) == 'main'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --env preview

      - name: Compute preview URLs
        id: preview-url
        env:
          VERSION_URL: ${{ steps.versions.outputs.deployment-url }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_SLUG: ${{ steps.alias.outputs.slug }}
        run: |
          version_url="${VERSION_URL:-}"
          deploy_url="${DEPLOY_URL:-}"
          alias_slug="${ALIAS_SLUG:-}"
          alias_url=""
          if [ -n "$alias_slug" ] && [ -n "$version_url" ]; then
            alias_url=$(printf '%s' "$version_url" | sed -E "s#^(https?://)[^-]+#\\1${alias_slug}#")
          fi
          echo "commit_url=$version_url" >> "$GITHUB_OUTPUT"
          echo "alias_url=$alias_url" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Set commit status (result)
        if: always()
        # "Preview (commit)" points at the immutable version URL.
        # "Preview (branch)" keeps the old success signal: PRs only go green
        # when both version uploads succeeded, and main only goes green when
        # both deploy steps succeeded.
        uses: actions/github-script@v8
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VERSIONS_SUCCESS: ${{ steps.versions.outcome == 'success' && steps.versions-nextjs.outcome == 'success' }}
          DEPLOY_SUCCESS: ${{ steps.deploy.outcome == 'success' && steps.deploy-nextjs.outcome == 'success' }}
          COMMIT_URL: ${{ steps.preview-url.outputs.commit_url }}
          ALIAS_URL: ${{ steps.preview-url.outputs.alias_url }}
          DEPLOY_URL: ${{ steps.preview-url.outputs.deploy_url }}
        with:
          script: |
            const {
              SERVER_URL,
              REPO,
              RUN_ID,
              HEAD_SHA,
              VERSIONS_SUCCESS,
              DEPLOY_SUCCESS,
              COMMIT_URL,
              ALIAS_URL,
              DEPLOY_URL,
            } = process.env;
            const versionsSuccess = VERSIONS_SUCCESS === 'true';
            const deploySuccess = DEPLOY_SUCCESS === 'true';
            const runUrl = `${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}`;
            const commitTarget = versionsSuccess && COMMIT_URL
              ? COMMIT_URL
              : '';
            const branchTarget = versionsSuccess && ALIAS_URL
              ? ALIAS_URL
              : deploySuccess && DEPLOY_URL
                ? DEPLOY_URL
                : '';
            const commitState = commitTarget
              ? 'success'
              : 'failure';
            const args = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: HEAD_SHA,
            };
            await github.rest.repos.createCommitStatus({
              ...args,
              state: commitState,
              target_url: commitTarget || runUrl,
              context: 'Preview (commit)',
            });
            await github.rest.repos.createCommitStatus({
              ...args,
              state: branchTarget ? 'success' : 'failure',
              target_url: branchTarget || runUrl,
              context: 'Preview (branch)',
            });
