name: build-styles

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build styles
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Build styles
        run: pnpm -F site run build-styles

      - name: Generate patch
        id: patch
        # `commit-or-pr` already stages and writes the diff. This step only
        # detects whether the generator changed anything so no-op runs stay green.
        run: |
          git add -A
          if git diff --cached --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit or create PR
        if: steps.patch.outputs.has_changes == 'true'
        uses: ./.github/workflows/commit-or-pr
        with:
          # This write-back step intentionally assumes PRs come from branches
          # on this repository instead of forks.
          # On pull requests we push back to the branch; on pushes to `main`
          # this opens or updates the long-lived bot PR for generated styles.
          event: ${{ github.event_name }}
          message: Update styles
          head-branch: ${{ github.head_ref || github.ref_name }}
          new-branch: chore/update-styles
          token: ${{ secrets.ARIAKIT_BOT_PAT }}
