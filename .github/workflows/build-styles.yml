name: build-styles

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build styles
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WRITEBACK_ALLOWED: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Check out the PR branch tip (not the merge ref) so `commit-or-pr`
          # can fetch and rebase onto `origin/$HEAD_REF` cleanly. Otherwise
          # the merge ref includes commits from `main` that are absent from
          # the PR branch, which causes rebase conflicts.
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/workflows/setup

      - name: Build styles
        run: pnpm -F app run build-styles

      - name: Detect changes
        id: patch
        # Scope the diff check to the generator's output. Other tree changes
        # from earlier steps (e.g., `pnpm install` rewriting `pnpm-lock.yaml`
        # to re-add pnpm's self-managed `packageManagerDependencies` section)
        # must not trigger a style commit.
        run: |
          git add -A -- app/src/styles/styles.json
          if git diff --cached --quiet --exit-code; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Verify branch tip
        id: branch
        if: >
          steps.patch.outputs.has_changes == 'true' &&
          env.WRITEBACK_ALLOWED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          branch="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git fetch --no-tags origin "$branch"
          local_sha="$(git rev-parse HEAD)"
          remote_sha="$(git rev-parse FETCH_HEAD)"
          if [ "$local_sha" != "$remote_sha" ]; then
            echo "Branch advanced from $local_sha to $remote_sha; skipping write-back."
            echo "is_current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "is_current=true" >> "$GITHUB_OUTPUT"
          echo "local_sha=$local_sha" >> "$GITHUB_OUTPUT"

      - name: Commit or create PR
        if: >
          steps.patch.outputs.has_changes == 'true' &&
          env.WRITEBACK_ALLOWED == 'true' &&
          steps.branch.outputs.is_current == 'true'
        uses: ./.github/workflows/commit-or-pr
        with:
          # This write-back step intentionally assumes PRs come from branches
          # on this repository instead of forks.
          # On pull requests we push back to the branch; on pushes to `main`
          # this opens or updates the long-lived bot PR for generated styles.
          event: ${{ github.event_name }}
          message: Update styles
          head-branch: ${{ github.head_ref || github.ref_name }}
          expected-head-sha: ${{ steps.branch.outputs.local_sha }}
          new-branch: chore/update-styles
          paths: app/src/styles/styles.json
          app-client-id: ${{ vars.ARIAKIT_CI_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.ARIAKIT_CI_APP_PRIVATE_KEY }}
